spring.application.name=proyecto2-backend

# --- MySQL (ajusta usuario/clave y crea la DB primero) ---
spring.datasource.url=jdbc:mysql://localhost:3306/proyecto2?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway (migraciones en src/main/resources/db/migration)
spring.flyway.enabled=true

# JSON
spring.jackson.time-zone=UTC

server.port=8080

